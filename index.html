<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우리 결혼합니다</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Nanum Myeongjo', serif;
            background-color: #f9f6f2;
            color: #333;
            text-align: center;
        }
        .container {
            max-width: 480px;
            margin: 0 auto;
            background: #fff;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
        }
        /* 메인 섹션 */
        .main-visual {
            padding: 60px 20px;
            background: #fffaf0;
        }
        .main-visual h1 { font-size: 1.5rem; letter-spacing: 2px; }
        .main-image {
            width: 100%;
            height: 400px;
            background: #ddd url('https://via.placeholder.com/400x600') no-repeat center/cover;
            margin: 20px 0;
        }
        /* 정보 섹션 */
        .info-section { padding: 50px 20px; }
        .date { font-size: 1.2rem; color: #8a7b6a; margin-bottom: 10px; }
        .location { font-size: 1rem; color: #666; }
        
        /* 버튼 스타일 */
        .btn {
            display: inline-block;
            padding: 10px 20px;
            margin: 10px;
            background: #8a7b6a;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
            font-size: 0.9rem;
            cursor: pointer;
            border: none;
        }
    </style>
</head>
<body>

<div class="container">
    <section class="main-visual">
        <p>JOIN US FOR THE WEDDING OF</p>
        <h1>김철수 & 이영희</h1>
        <div class="main-image">
            </div>
        <p>2026년 05월 16일 토요일 오전 11시</p>
    </section>

    <section class="info-section">
        <h2>서로의 하루가 되어주기로 한 두 사람이</h2>
        <p>이제 한 걸음을 함께 내딛습니다.<br>이번 시작은 소중한 가족과 가까운 분들만 모시고<br>조용히 나누려 합니다.</p>
직접 모시지 못하는 점 넓은 마음으로 양해 부탁드립니다.
언제나처럼 따뜻한 마음으로 축복해 주신다면
그 마음 오래도록 간직하겠습니다.


        <hr style="width: 30px; border: 0.5px solid #8a7b6a; margin: 30px auto;">
        <div class="location">
           왜관 칠곡군 국조전
        </div>
        
        <button class="btn" onclick="copyAccount('123-456-789012')">신랑 마음 전하기(복사)</button>
    </section>
</div>

<script>
    function copyAccount(account) {
        navigator.clipboard.writeText(account).then(() => {
            alert("계좌번호가 복사되었습니다.");
        });
    }
</script>

</body>
</html>
